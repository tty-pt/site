name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang build-essential python3 python3-pip
      - name: Start site
        run: |
          AUTH_SKIP_CONFIRM=1 ./start.sh &
          sleep 1
      - name: Run test suite
        run: AUTH_SKIP_CONFIRM=1 make test
